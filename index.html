<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FlashLang – Korean Card</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;700&family=Space+Mono:wght@400;700&family=Noto+Sans+Thai:wght@300;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0d0f;
    --card: #16161a;
    --border: #2a2a35;
    --accent: #c084fc;
    --green: #4ade80;
    --red: #f87171;
    --yellow: #fbbf24;
    --text: #e8e8f0;
    --muted: #6b6b80;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
    background-image: radial-gradient(ellipse at 20% 20%, #1a0a2e 0%, transparent 50%),
                      radial-gradient(ellipse at 80% 80%, #0a1a1a 0%, transparent 50%);
  }

  header {
    width: 100%;
    max-width: 500px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 24px;
  }

  .logo {
    font-size: 18px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 2px;
  }

  .lang-selector {
    display: flex;
    gap: 8px;
  }

  .lang-btn {
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 6px 12px;
    border-radius: 20px;
    cursor: pointer;
    font-size: 12px;
    font-family: 'Space Mono', monospace;
    transition: all 0.2s;
  }

  .lang-btn.active {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(192,132,252,0.1);
  }

.lang-btn:disabled {
  opacity: 0.45;
  cursor: not-allowed;
}

  .progress-bar {
    width: 100%;
    max-width: 500px;
    height: 3px;
    background: var(--border);
    border-radius: 3px;
    margin-bottom: 8px;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), #818cf8);
    border-radius: 3px;
    transition: width 0.4s ease;
  }

  .progress-text {
    font-size: 11px;
    color: var(--muted);
    text-align: right;
    width: 100%;
    max-width: 500px;
    margin-bottom: 20px;
  }

  /* CARD */
  .card-wrapper {
    perspective: 1000px;
    width: 100%;
    max-width: 500px;
    height: 280px;
    margin-bottom: 24px;
    cursor: pointer;
  }

  .card-inner {
    width: 100%;
    height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .card-inner.flipped {
    transform: rotateY(180deg);
  }

  .card-face {
    position: absolute;
    inset: 0;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    backface-visibility: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 32px;
    overflow: hidden;
  }

  .card-face::before {
    content: '';
    position: absolute;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: radial-gradient(circle at center, rgba(192,132,252,0.05) 0%, transparent 60%);
    pointer-events: none;
  }

  .card-back {
    transform: rotateY(180deg);
    background: linear-gradient(135deg, #16161a, #1a1025);
  }

  .card-tag {
    position: absolute;
    top: 16px;
    left: 20px;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .card-hint {
    position: absolute;
    bottom: 16px;
    font-size: 11px;
    color: var(--muted);
  }

  .main-text {
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 52px;
    font-weight: 700;
    color: var(--text);
    text-align: center;
    line-height: 1.2;
  }

  .main-text.small { font-size: 32px; }

  .romanize {
    font-size: 16px;
    color: var(--accent);
    margin-top: 8px;
    letter-spacing: 1px;
  }

  .meaning {
    font-family: 'Noto Sans Thai', sans-serif;
    font-size: 22px;
    font-weight: 500;
    color: var(--text);
    text-align: center;
    margin-bottom: 4px;
  }

  .example {
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 13px;
    color: var(--muted);
    text-align: center;
    margin-top: 12px;
    line-height: 1.6;
  }

  /* VOICE */
  .voice-section {
    width: 100%;
    max-width: 500px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px;
    margin-bottom: 20px;
    position: relative;
    overflow: hidden;
  }

  .voice-label {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 2px;
    margin-bottom: 14px;
    text-transform: uppercase;
  }

  .mic-row {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .mic-btn {
    width: 56px;
    height: 56px;
    border-radius: 50%;
    border: 2px solid var(--accent);
    background: rgba(192,132,252,0.1);
    color: var(--accent);
    font-size: 22px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    flex-shrink: 0;
  }

  .mic-btn:hover { background: rgba(192,132,252,0.2); }
  .mic-btn.recording {
    background: rgba(248,113,113,0.15);
    border-color: var(--red);
    color: var(--red);
    animation: pulse 1s infinite;
  }

  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(248,113,113,0.4); }
    50% { box-shadow: 0 0 0 10px rgba(248,113,113,0); }
  }

  .voice-result {
    flex: 1;
  }

  .voice-heard {
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 4px;
  }

  .voice-text {
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 20px;
    color: var(--text);
    min-height: 28px;
  }

  .score-badge {
    display: inline-block;
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 700;
    margin-top: 6px;
  }

  .score-correct { background: rgba(74,222,128,0.15); color: var(--green); border: 1px solid var(--green); }
  .score-close   { background: rgba(251,191,36,0.15);  color: var(--yellow); border: 1px solid var(--yellow); }
  .score-wrong   { background: rgba(248,113,113,0.15); color: var(--red);    border: 1px solid var(--red); }

  /* BUTTONS */
  .btn-row {
    display: flex;
    gap: 10px;
    width: 100%;
    max-width: 500px;
    margin-bottom: 20px;
  }

  .btn {
    flex: 1;
    padding: 14px;
    border-radius: 12px;
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn:hover { border-color: var(--accent); color: var(--accent); }

  .btn-next {
    background: var(--accent);
    border-color: var(--accent);
    color: #0d0d0f;
    font-weight: 700;
  }

  .btn-next:hover { background: #a855f7; border-color: #a855f7; color: #0d0d0f; }

  /* STATS */
  .stats-row {
    display: flex;
    gap: 12px;
    width: 100%;
    max-width: 500px;
  }

  .stat-box {
    flex: 1;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px;
    text-align: center;
  }

  .stat-num { font-size: 22px; font-weight: 700; }
  .stat-label { font-size: 10px; color: var(--muted); letter-spacing: 1px; margin-top: 2px; }

  .no-support {
    background: rgba(248,113,113,0.1);
    border: 1px solid var(--red);
    border-radius: 10px;
    padding: 10px 16px;
    font-size: 12px;
    color: var(--red);
    width: 100%;
    max-width: 500px;
    margin-bottom: 16px;
    display: none;
  }

  /* DONE SCREEN */
  .done-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(13,13,15,0.92);
    backdrop-filter: blur(8px);
    z-index: 100;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
  }
  .done-overlay.show { display: flex; }
  .done-box {
    background: var(--card);
    border: 1px solid var(--accent);
    border-radius: 24px;
    padding: 40px 36px;
    text-align: center;
    max-width: 340px;
    width: 90%;
  }
  .done-emoji { font-size: 56px; margin-bottom: 12px; }
  .done-title { font-size: 20px; font-weight: 700; color: var(--accent); margin-bottom: 8px; }
  .done-score { font-size: 14px; color: var(--muted); margin-bottom: 24px; line-height: 1.8; }
  .done-score span { color: var(--text); font-weight: 700; }
  .btn-restart {
    background: var(--accent); border: none; color: #0d0d0f;
    font-family: 'Space Mono', monospace; font-size: 13px; font-weight: 700;
    padding: 14px 32px; border-radius: 12px; cursor: pointer; width: 100%;
    transition: background 0.2s;
  }
  .btn-restart:hover { background: #a855f7; }

  /* TIMER SECTION */
  .timer-section {
    width: 100%;
    max-width: 500px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 16px 20px;
    margin-bottom: 20px;
  }
  .timer-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 0;
  }
  .timer-label {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
  }
  .toggle-switch {
    position: relative;
    width: 40px;
    height: 22px;
    cursor: pointer;
  }
  .toggle-switch input { display: none; }
  .toggle-track {
    position: absolute;
    inset: 0;
    background: var(--border);
    border-radius: 22px;
    transition: background 0.2s;
  }
  .toggle-switch input:checked + .toggle-track { background: var(--accent); }
  .toggle-thumb {
    position: absolute;
    top: 3px; left: 3px;
    width: 16px; height: 16px;
    background: #fff;
    border-radius: 50%;
    transition: transform 0.2s;
  }
  .toggle-switch input:checked ~ .toggle-thumb { transform: translateX(18px); }

  .timer-controls {
    margin-top: 14px;
    display: none;
  }
  .timer-controls.visible { display: block; }

  .timer-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
  }
  .timer-row label { font-size: 12px; color: var(--muted); flex-shrink: 0; }
  .sec-input {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 14px;
    padding: 6px 10px;
    border-radius: 8px;
    width: 70px;
    text-align: center;
  }
  .sec-input:focus { outline: none; border-color: var(--accent); }

  .timer-mode-row {
    display: flex;
    gap: 8px;
    margin-bottom: 10px;
  }
  .mode-btn {
    flex: 1;
    padding: 7px 4px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .mode-btn.active {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(192,132,252,0.1);
  }

  .timer-bar-wrap {
    height: 4px;
    background: var(--border);
    border-radius: 4px;
    overflow: hidden;
    margin-top: 4px;
  }
  .timer-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--green), var(--accent));
    border-radius: 4px;
    transition: width 1s linear, background 0.3s;
    width: 100%;
  }
  .timer-bar-fill.warn { background: linear-gradient(90deg, var(--red), var(--yellow)); }
  .timer-countdown {
    font-size: 11px;
    color: var(--muted);
    text-align: right;
    margin-top: 4px;
  }

  .speak-btn {
    position: absolute;
    bottom: 16px;
    right: 20px;
    background: rgba(192,132,252,0.12);
    border: 1px solid rgba(192,132,252,0.3);
    color: var(--accent);
    border-radius: 50%;
    width: 36px; height: 36px;
    font-size: 16px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
    z-index: 2;
  }
  .speak-btn:hover { background: rgba(192,132,252,0.25); transform: scale(1.1); }
  .speak-btn.speaking {
    background: rgba(192,132,252,0.3);
    animation: pulse 0.8s infinite;
  }

  /* TOPIC SELECTOR */
  .topic-bar {
    width: 100%;
    max-width: 500px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 14px 16px;
    margin-bottom: 16px;
    display: flex;
    gap: 10px;
    align-items: center;
    flex-wrap: wrap;
  }
  .topic-select, .level-select {
    flex: 1;
    min-width: 110px;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    padding: 7px 10px;
    border-radius: 8px;
    cursor: pointer;
    appearance: none;
  }
  .topic-select:focus, .level-select:focus { outline: none; border-color: var(--accent); }
  .gen-btn {
    background: var(--accent);
    border: none;
    color: #0d0d0f;
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    font-weight: 700;
    padding: 8px 16px;
    border-radius: 8px;
    cursor: pointer;
    white-space: nowrap;
    transition: background 0.2s;
  }
  .gen-btn:hover { background: #a855f7; }
  .gen-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  /* LOADING */
  .loading-bar {
    width: 100%;
    max-width: 500px;
    display: none;
    align-items: center;
    gap: 10px;
    margin-bottom: 12px;
    font-size: 12px;
    color: var(--muted);
  }
  .loading-bar.show { display: flex; }
  .loading-spin {
    width: 16px; height: 16px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    flex-shrink: 0;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<header>
  <div class="logo">⚡ FLASHLANG</div>
  <div class="lang-selector">
    <button class="lang-btn" disabled title="Disabled for API testing">🇰🇷 KO</button>
    <button class="lang-btn active" onclick="setLang('ja')">🇯🇵 JA</button>
    <button class="lang-btn" disabled title="Disabled for API testing">🇨🇳 ZH</button>
  </div>
</header>

<div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
<div class="progress-text" id="progressText">0 / 0</div>

<!-- TOPIC + GENERATE -->
<div class="topic-bar">
  <select class="level-select" id="levelSelect">
    <option value="5">🟢 N5 / เริ่มต้น</option>
    <option value="4">🟡 N4 / ต้น</option>
    <option value="3">🟠 N3 / กลาง</option>
    <option value="2">🔴 N2 / สูง</option>
    <option value="1">⚫ N1 / สูงมาก</option>
  </select>
  <button class="gen-btn" id="genBtn" onclick="generateDeck()">✦ โหลดคำใหม่</button>
</div>

<div class="loading-bar" id="loadingBar">
  <div class="loading-spin"></div>
  <span id="loadingText">กำลังสร้างคำศัพท์…</span>
</div>

<div class="no-support" id="noSupport">⚠️ เบราว์เซอร์นี้ไม่รองรับ Voice Recognition — ลอง Chrome บน Desktop</div>

<!-- DONE OVERLAY -->
<div class="done-overlay" id="doneOverlay">
  <div class="done-box">
    <div class="done-emoji">🎉</div>
    <div class="done-title">จบแล้ว!</div>
    <div class="done-score" id="doneScore"></div>
    <button class="btn-restart" onclick="restartDeck()">🔄 เริ่มใหม่อีกรอบ</button>
  </div>
</div>

<!-- CARD -->
<div class="card-wrapper" onclick="flipCard()">
  <div class="card-inner" id="cardInner">
    <div class="card-face card-front">
      <div class="card-tag">แตะเพื่อพลิก</div>
      <div class="main-text" id="frontText">안녕하세요</div>
      <div class="romanize" id="frontRoman">an-nyeong-ha-se-yo</div>
      <button class="speak-btn" id="speakBtn" onclick="event.stopPropagation(); speakWord()" title="ฟังเสียงออกเสียง">🔊</button>
      <div class="card-hint">👆 tap to reveal</div>
    </div>
    <div class="card-face card-back">
      <div class="card-tag">ความหมาย</div>
      <div class="meaning" id="backMeaning">สวัสดี</div>
      <div class="example" id="backExample"></div>
      <div class="card-hint">👆 tap to flip back</div>
    </div>
  </div>
</div>

<!-- TIMER -->
<div class="timer-section">
  <div class="timer-header">
    <div class="timer-label">⏱ Auto Timer</div>
    <label class="toggle-switch">
      <input type="checkbox" id="timerToggle" onchange="onTimerToggle()">
      <div class="toggle-track"></div>
      <div class="toggle-thumb"></div>
    </label>
  </div>
  <div class="timer-controls" id="timerControls">
    <div class="timer-mode-row" style="margin-top:12px">
      <button class="mode-btn active" id="modeFlip" onclick="setTimerMode('flip')">พลิกอัตโนมัติ</button>
      <button class="mode-btn" id="modeNext" onclick="setTimerMode('next')">เลื่อนถัดไปเลย</button>
    </div>
    <div class="timer-row">
      <label>วินาที:</label>
      <input class="sec-input" type="number" id="secInput" value="5" min="1" max="99" onchange="onSecChange()">
      <div style="font-size:11px;color:var(--muted)">วิ / การ์ด</div>
    </div>
    <div class="timer-bar-wrap">
      <div class="timer-bar-fill" id="timerBarFill"></div>
    </div>
    <div class="timer-countdown" id="timerCountdown">–</div>
  </div>
</div>

<!-- VOICE -->
<div class="voice-section">
  <div class="voice-label">🎤 ลองพูดดูสิ</div>
  <div class="mic-row">
    <button class="mic-btn" id="micBtn" onclick="toggleRecording()">🎙️</button>
    <div class="voice-result">
      <div class="voice-heard">ได้ยินว่า:</div>
      <div class="voice-text" id="voiceText">–</div>
      <div id="scoreBadge"></div>
    </div>
  </div>
</div>

<!-- BUTTONS -->
<div class="btn-row">
  <button class="btn" onclick="markResult('wrong')">✗ ยังไม่รู้</button>
  <button class="btn" onclick="markResult('correct')">✓ รู้แล้ว</button>
  <button class="btn btn-next" onclick="nextCard()">ใบถัดไป →</button>
</div>

<!-- STATS -->
<div class="stats-row">
  <div class="stat-box">
    <div class="stat-num" id="statCorrect" style="color:var(--green)">0</div>
    <div class="stat-label">รู้แล้ว</div>
  </div>
  <div class="stat-box">
    <div class="stat-num" id="statWrong" style="color:var(--red)">0</div>
    <div class="stat-label">ยังไม่รู้</div>
  </div>
  <div class="stat-box">
    <div class="stat-num" id="statStreak" style="color:var(--yellow)">0</div>
    <div class="stat-label">streak 🔥</div>
  </div>
</div>

<script>
// ===== DATA =====
const decks = {
  ko: [
    { front:"안녕하세요", roman:"an-nyeong-ha-se-yo", meaning:"สวัสดี", example:"안녕하세요! 처음 뵙겠습니다.\n(สวัสดี! ยินดีที่ได้รู้จัก)" },
    { front:"감사합니다", roman:"gam-sa-ham-ni-da", meaning:"ขอบคุณ", example:"감사합니다 선생님!\n(ขอบคุณครับ/ค่ะ คุณครู)" },
    { front:"죄송합니다", roman:"jwe-song-ham-ni-da", meaning:"ขอโทษ", example:"늦어서 죄송합니다.\n(ขอโทษที่มาสาย)" },
    { front:"사랑해요", roman:"sa-rang-hae-yo", meaning:"ฉันรักคุณ", example:"나는 너를 사랑해요.\n(ฉันรักเธอ)" },

function speakWord() {
  if(isDone || idx >= deck.length) return;
  const text = deck[idx].front;
  const lang = ttsLang[currentLang];
  const btn = document.getElementById('speakBtn');

  window.speechSynthesis.cancel();
  const utt = new SpeechSynthesisUtterance(text);
  utt.lang = lang;
  utt.rate = 0.85;

  // pick best matching voice if available
  const voices = speechSynthesis.getVoices();
  const match = voices.find(v => v.lang.startsWith(lang.slice(0,2)));
  if(match) utt.voice = match;

  utt.onstart  = () => { btn.classList.add('speaking'); btn.textContent = '🔉'; };
  utt.onend    = () => { btn.classList.remove('speaking'); btn.textContent = '🔊'; };
  utt.onerror  = () => { btn.classList.remove('speaking'); btn.textContent = '🔊'; };

  speechSynthesis.speak(utt);
}

async function generateDeck() {
  const btn = document.getElementById('genBtn');
  const bar = document.getElementById('loadingBar');
  const level = parseInt(document.getElementById('levelSelect').value);
  btn.disabled = true;
  bar.classList.add('show');

  try {
    if (currentLang === 'ja') {
      // ── Japanese: JLPT Vocab API (free, no key) ──
      document.getElementById('loadingText').textContent = `กำลังโหลด JLPT N${level}…`;
      const total = await fetchJLPTTotal(level);
      const cards = await fetchJLPTRandom(level, total, 20);
      if (!cards.length) throw new Error('JLPT API returned 0 words');
      applyDeck(cards);

    } else if (currentLang === 'ko') {
      // ── Korean: shuffle built-in pool (offline, instant) ──
      document.getElementById('loadingText').textContent = 'กำลังสุ่มคำศัพท์เกาหลี…';
      const cards = shuffle([...koPool]).slice(0, 20);
      applyDeck(cards);

    } else {
      // ── Chinese: shuffle built-in pool (offline, instant) ──
      document.getElementById('loadingText').textContent = 'กำลังสุ่มคำศัพท์จีน…';
      const cards = shuffle([...zhPool]).slice(0, 20);
      applyDeck(cards);
    }
  } catch(e) {
    console.error(e);
    // For Japanese API testing: do not silently fallback to built-in words
    if (currentLang === 'ja') {
      const msg = (e && e.message) ? e.message : 'unknown error';
      document.getElementById('loadingText').textContent = `❌ API error: ${msg}`;
      return;
    }
    document.getElementById('loadingText').textContent = '❌ โหลดไม่ได้ ใช้คำศัพท์สำรอง';
    const fallback = shuffle([...decks[currentLang]]).slice(0, 20);
    applyDeck(fallback);
    setTimeout(()=>bar.classList.remove('show'), 2000);
  } finally {
    btn.disabled = false;
    if (currentLang !== 'ja' || document.getElementById('loadingText').textContent.indexOf('API error:') === -1) {
      bar.classList.remove('show');
    }
  }
}

async function fetchJLPTTotal(level) {
  const r = await fetch(`https://jlpt-vocab-api.vercel.app/api/words?level=${level}&limit=1`, { cache: 'no-store' });
  if (!r.ok) throw new Error(`HTTP ${r.status} while loading total`);
  const d = await r.json();
  return d.total || 500;
}

async function fetchJLPTRandom(level, total, count) {
  const safeTotal = Number.isFinite(total) ? total : count;
  const maxOffset = Math.max(0, safeTotal - count);
  const triedOffsets = [];

  // Some offsets return empty arrays on this public API; retry a few times.
  for (let attempt = 0; attempt < 5; attempt++) {
    const offset = Math.floor(Math.random() * (maxOffset + 1));
    triedOffsets.push(offset);
    const r = await fetch(`https://jlpt-vocab-api.vercel.app/api/words?level=${level}&offset=${offset}&limit=${count}`, { cache: 'no-store' });
    if (!r.ok) throw new Error(`HTTP ${r.status} while loading words`);
    const d = await r.json();
    const words = Array.isArray(d?.words) ? d.words : (Array.isArray(d) ? d : []);
    if (words.length) {
      return words.map(w => ({
        front:   w.word || w.furigana,
        roman:   w.romaji || w.furigana || '',
        meaning: w.meaning || '–',
        example: ''
      })).filter(w => w.front);
    }
  }

  // Deterministic fallback pass for unstable offsets
  const fallbackOffset = 0;
  const r = await fetch(`https://jlpt-vocab-api.vercel.app/api/words?level=${level}&offset=${fallbackOffset}&limit=${count}`, { cache: 'no-store' });
  if (!r.ok) throw new Error(`HTTP ${r.status} while loading fallback words`);
  const d = await r.json();
  const words = Array.isArray(d?.words) ? d.words : (Array.isArray(d) ? d : []);
  if (!words.length) {
    throw new Error(`API returned empty words for offsets: ${triedOffsets.join(', ')}, fallback: ${fallbackOffset}`);
  }
  return words.map(w => ({
    front:   w.word || w.furigana,
    roman:   w.romaji || w.furigana || '',
    meaning: w.meaning || '–',
    example: ''
  })).filter(w => w.front);
}

function applyDeck(cards) {
  if (!cards || cards.length === 0) throw new Error('empty');
  decks[currentLang] = cards;
  deck = shuffle([...cards]);
  idx = 0; correct = 0; wrong = 0; streak = 0; isDone = false;
  updateStats();
  document.getElementById('doneOverlay').classList.remove('show');
  loadCard();
}
// ===== INIT =====
function setLang(lang) {
  if (lang !== 'ja') return;
  currentLang = lang;
  document.querySelectorAll('.lang-btn').forEach((b,i)=>{
    b.classList.toggle('active', ['ko','ja','zh'][i]===lang);
  });
  // show JLPT level only for Japanese
  document.getElementById('levelSelect').style.display = lang === 'ja' ? '' : 'none';

  deck = shuffle([...decks[lang]]);
  idx = 0; correct = 0; wrong = 0; streak = 0; isDone = false;
  updateStats();
  loadCard();
  stopRecording();
  restartTimer();
  generateDeck();
}

function shuffle(arr) {
  for(let i=arr.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]]=[arr[j],arr[i]];
  }
  return arr;
}

function loadCard() {
  if(idx >= deck.length) {
    isDone = true;
    stopTimer();
    showDoneScreen();
    return;
  }
  isDone = false;
  const card = deck[idx];
  isFlipped = false;
  document.getElementById('cardInner').classList.remove('flipped');
  document.getElementById('frontText').textContent = card.front;
  document.getElementById('frontText').className = 'main-text' + (card.front.length > 5 ? ' small' : '');
  document.getElementById('frontRoman').textContent = card.roman;
  document.getElementById('backMeaning').textContent = card.meaning;
  document.getElementById('backExample').textContent = card.example || '';
  document.getElementById('voiceText').textContent = '–';
  document.getElementById('scoreBadge').innerHTML = '';
  updateProgress();
  if(timerEnabled) startTimerCycle();
  // auto-speak after short delay so card animation settles
  setTimeout(speakWord, 400);
}

function showDoneScreen() {
  document.getElementById('doneScore').innerHTML =
    `ถูก <span>${correct}</span> / ผิด <span style="color:var(--red)">${wrong}</span> / ทั้งหมด <span>${deck.length}</span> ใบ<br>Streak สูงสุด 🔥`;
  document.getElementById('doneOverlay').classList.add('show');
}

function restartDeck() {
  document.getElementById('doneOverlay').classList.remove('show');
  generateDeck();
}

function updateProgress() {
  const total = deck.length;
  const pct = total ? (idx/total*100) : 0;
  document.getElementById('progressFill').style.width = pct+'%';
  document.getElementById('progressText').textContent = `${idx} / ${total}`;
}

function updateStats() {
  document.getElementById('statCorrect').textContent = correct;
  document.getElementById('statWrong').textContent = wrong;
  document.getElementById('statStreak').textContent = streak;
}

function flipCard() {
  if(isDone) return;
  isFlipped = !isFlipped;
  document.getElementById('cardInner').classList.toggle('flipped', isFlipped);
}

function nextCard() {
  if(isDone) return;
  stopTimer();
  idx++;
  loadCard();
  stopRecording();
}

function markResult(type) {
  if(isDone) return;
  if(type==='correct') { correct++; streak++; }
  else { wrong++; streak=0; }
  updateStats();
  nextCard();
}

// ===== TIMER =====
function onTimerToggle() {
  timerEnabled = document.getElementById('timerToggle').checked;
  document.getElementById('timerControls').classList.toggle('visible', timerEnabled);
  if(timerEnabled) {
    startTimerCycle();
  } else {
    stopTimer();
    document.getElementById('timerCountdown').textContent = '–';
    document.getElementById('timerBarFill').style.width = '100%';
  }
}

function setTimerMode(mode) {
  timerMode = mode;
  document.getElementById('modeFlip').classList.toggle('active', mode==='flip');
  document.getElementById('modeNext').classList.toggle('active', mode==='next');
  if(timerEnabled) startTimerCycle();
}

function onSecChange() {
  const v = parseInt(document.getElementById('secInput').value);
  timerSec = isNaN(v)||v<1 ? 1 : v>99 ? 99 : v;
  document.getElementById('secInput').value = timerSec;
  if(timerEnabled) startTimerCycle();
}

function startTimerCycle() {
  stopTimer();
  if(isDone || !timerEnabled) return;
  timerPhase = 'front';
  timerRemaining = timerSec;
  runTick();
  timerInterval = setInterval(runTick, 1000);
}

function runTick() {
  if(isDone) { stopTimer(); return; }
  const fill = document.getElementById('timerBarFill');
  const pct = (timerRemaining / timerSec) * 100;
  fill.style.width = pct + '%';
  fill.classList.toggle('warn', timerRemaining <= Math.ceil(timerSec * 0.3));
  document.getElementById('timerCountdown').textContent = timerRemaining + 'วิ';

  if(timerRemaining <= 0) {
    if(timerMode === 'flip') {
      if(timerPhase === 'front') {
        // flip to back
        isFlipped = true;
        document.getElementById('cardInner').classList.add('flipped');
        timerPhase = 'back';
        timerRemaining = timerSec;
      } else {
        // move to next card
        stopTimer();
        idx++;
        loadCard();
      }
    } else {
      // mode = next: just skip to next
      stopTimer();
      idx++;
      loadCard();
    }
    return;
  }
  timerRemaining--;
}

function stopTimer() {
  if(timerInterval) { clearInterval(timerInterval); timerInterval = null; }
}

function restartTimer() {
  if(timerEnabled) startTimerCycle();
}

// ===== VOICE =====
function setupRecognition() {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!SpeechRecognition) {
    document.getElementById('noSupport').style.display='block';
    document.getElementById('micBtn').disabled = true;
    document.getElementById('micBtn').title = 'ไม่รองรับ';
    return null;
  }
  const rec = new SpeechRecognition();
  rec.continuous = false;
  rec.interimResults = false;
  rec.maxAlternatives = 3;

  rec.onresult = (e) => {
    const heard = e.results[0][0].transcript.trim();
    document.getElementById('voiceText').textContent = heard || '–';
    checkPronunciation(heard);
    isRecording = false;
    document.getElementById('micBtn').classList.remove('recording');
    document.getElementById('micBtn').textContent = '🎙️';
  };
  rec.onerror = () => { isRecording=false; document.getElementById('micBtn').classList.remove('recording'); document.getElementById('micBtn').textContent='🎙️'; };
  rec.onend   = () => { isRecording=false; document.getElementById('micBtn').classList.remove('recording'); document.getElementById('micBtn').textContent='🎙️'; };
  return rec;
}

function toggleRecording() {
  if(!recognition) recognition = setupRecognition();
  if(!recognition) return;
  if(isRecording) {
    stopRecording();
  } else {
    recognition.lang = langCodes[currentLang];
    recognition.start();
    isRecording = true;
    document.getElementById('micBtn').classList.add('recording');
    document.getElementById('micBtn').textContent = '⏹';
    document.getElementById('voiceText').textContent = '…กำลังฟัง';
    document.getElementById('scoreBadge').innerHTML = '';
  }
}

function stopRecording() {
  if(recognition && isRecording) { try{ recognition.stop(); }catch(e){} }
  isRecording = false;
  document.getElementById('micBtn').classList.remove('recording');
  document.getElementById('micBtn').textContent = '🎙️';
}

function checkPronunciation(heard) {
  if(isDone || idx >= deck.length) return;
  const target = deck[idx].front.replace(/\s/g,'').toLowerCase();
  const heardClean = heard.replace(/\s/g,'').toLowerCase();
  const badge = document.getElementById('scoreBadge');
  if(heardClean === target) {
    badge.innerHTML = '<span class="score-badge score-correct">✓ ถูกต้อง! ยอดเยี่ยม</span>';
  } else {
    const sim = similarity(heardClean, target);
    if(sim >= 0.6) badge.innerHTML = `<span class="score-badge score-close">~ เกือบถูก! (${Math.round(sim*100)}%)</span>`;
    else           badge.innerHTML = `<span class="score-badge score-wrong">✗ ลองใหม่ (${Math.round(sim*100)}%)</span>`;
  }
}

function similarity(a, b) {
  if(!a||!b) return 0;
  const longer = a.length>b.length?a:b;
  const shorter = a.length>b.length?b:a;
  if(longer.length===0) return 1;
  return (longer.length - editDistance(longer,shorter)) / longer.length;
}

function editDistance(a,b) {
  const dp = Array.from({length:b.length+1},(_,i)=>i);
  for(let i=1;i<=a.length;i++){
    let prev=i;
    for(let j=1;j<=b.length;j++){
      const val = a[i-1]===b[j-1] ? dp[j-1] : Math.min(dp[j-1],dp[j],prev)+1;
      dp[j-1]=prev; prev=val;
    }
    dp[b.length]=prev;
  }
  return dp[b.length];
}

// ===== START =====
setLang('ja');
